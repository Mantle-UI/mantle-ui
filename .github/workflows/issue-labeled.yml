name: Issue Labeled

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  issue-labeled:
    runs-on: ubuntu-latest

    steps:
      - name: Add comment based on label
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ github.event.label.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          case "$LABEL" in
            "Resolution: Cannot Replicate")
              gh issue comment "$ISSUE_NUMBER" --body \
                "We're unable to replicate your issue. If you are able to create a reproducer or add additional details, please edit this issue. This issue will be closed if there is no activity in 20 days."
              ;;

            "Resolution: Duplicate")
              gh issue comment "$ISSUE_NUMBER" --body \
                "This issue is a duplicate and has already been reported and possibly fixed. Please review both open and closed issues for a similar report."
              ;;

            "Status: Needs Reproducer")
              gh issue comment "$ISSUE_NUMBER" --body \
                $'Please fork the StackBlitz project below and create a case demonstrating your bug report.\n\nhttps://stackblitz.com/edit/vitejs-vite-pekean1c?file=src%2FApp.tsx\n\nThis issue will be closed if there is no activity in 20 days.'
              ;;

            *)
              echo "No comment configured for label: $LABEL"
              ;;
          esac
