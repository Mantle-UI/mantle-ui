name: Daily Build

on:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  nightly:
    if: github.repository == 'Mantle-UI/mantle-ui' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    name: Node ${{ matrix.node-version }}

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Build
      run: |
        npm install
        npm run build:lib
