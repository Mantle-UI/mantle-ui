name: Publish to npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to publish, for example v10.10.4
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          package-manager-cache: false
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Show npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --allow-remote=all

      - name: Verify release tag matches package.json version
        run: |
          TAG="${RELEASE_TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"

          echo "Release tag: $RELEASE_TAG"
          echo "package.json version: $PKG_VERSION"

          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Release tag ($RELEASE_TAG) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build library
        run: npm run build:lib

      - name: Publish to npm
        working-directory: dist
        run: npm publish --access public --provenance --loglevel verbose

      - name: Print npm debug logs on failure
        if: failure()
        run: |
          if ls /home/runner/.npm/_logs/*.log >/dev/null 2>&1; then
            for file in /home/runner/.npm/_logs/*.log; do
              echo "::group::${file}"
              cat "$file"
              echo "::endgroup::"
            done
          else
            echo "No npm debug logs found."
          fi
